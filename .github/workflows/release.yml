name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"          # e.g. v1.2.3
      - "v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+" # e.g. v1.2.3-rc.1

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  FLUTTER_VERSION: "3.41.6"
  APP_NAME: OpenSynaptic-Dashboard

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  # ── Guard: re-run CI checks before releasing ───────────────────────────────
  pre-release-checks:
    name: Pre-release checks (analyze + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter analyze --fatal-infos
      - run: flutter test

  # ── Android release APK + AAB ─────────────────────────────────────────────
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: pre-release-checks
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build release APK
        run: |
          flutter build apk --release \
            --obfuscate \
            --split-debug-info=build/symbols/android

      - name: Build release AAB
        run: |
          flutter build appbundle --release \
            --obfuscate \
            --split-debug-info=build/symbols/android-aab

      - name: Rename artifacts
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/${{ env.APP_NAME }}-${{ github.ref_name }}-android.apk
          mv build/app/outputs/bundle/release/app-release.aab \
             build/app/outputs/bundle/release/${{ env.APP_NAME }}-${{ github.ref_name }}-android.aab

      - uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: |
            build/app/outputs/flutter-apk/${{ env.APP_NAME }}-*.apk
            build/app/outputs/bundle/release/${{ env.APP_NAME }}-*.aab
          retention-days: 1

  # ── Windows release ──────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: pre-release-checks
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Zip Windows bundle
        run: |
          $src  = "build\windows\x64\runner\Release"
          $dest = "${{ env.APP_NAME }}-${{ github.ref_name }}-windows-x64.zip"
          Compress-Archive -Path "$src\*" -DestinationPath $dest
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: "${{ env.APP_NAME }}-*-windows-x64.zip"
          retention-days: 1

  # ── Linux release ─────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: pre-release-checks
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgtk-3-dev libblkid-dev liblzma-dev \
            ninja-build cmake clang pkg-config \
            libsqlite3-dev

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build Linux release
        run: flutter build linux --release

      - name: Tar Linux bundle
        run: |
          tar -czf \
            "${{ env.APP_NAME }}-${{ github.ref_name }}-linux-x64.tar.gz" \
            -C build/linux/x64/release/bundle .

      - uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: "${{ env.APP_NAME }}-*-linux-x64.tar.gz"
          retention-days: 1

  # ── Create GitHub Release ────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-windows, build-linux]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for changelog

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate changelog from git log
        id: changelog
        run: |
          PREV=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -z "$PREV" ]; then
            LOG=$(git log --oneline --no-merges | head -40)
          else
            LOG=$(git log --oneline --no-merges "${PREV}..HEAD")
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG"           >> $GITHUB_OUTPUT
          echo "EOF"            >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "OpenSynaptic Dashboard ${{ github.ref_name }}"
          body: |
            ## OpenSynaptic Dashboard ${{ github.ref_name }}

            ### Changelog
            ```
            ${{ steps.changelog.outputs.CHANGELOG }}
            ```

            ### Downloads
            | Platform | File |
            |---|---|
            | 🤖 Android APK | `*-android.apk` |
            | 🤖 Android AAB | `*-android.aab` |
            | 🪟 Windows x64 | `*-windows-x64.zip` |
            | 🐧 Linux x64   | `*-linux-x64.tar.gz` |

            ### Checksums
            ```
            $(sha256sum release-assets/*)
            ```
          files: release-assets/**
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc.') }}
          generate_release_notes: false

